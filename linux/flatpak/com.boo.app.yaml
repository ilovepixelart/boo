# Flatpak manifest for Boo.
#
# Build locally:
#   flatpak install --user flathub org.gnome.Platform//50 org.gnome.Sdk//50
#   flatpak-builder --user --install --force-clean build-dir \
#     linux/flatpak/com.boo.app.yaml
#   flatpak run com.boo.app
#
# Place the whisper model at
#   ~/.var/app/com.boo.app/data/boo/models/ggml-base.en.bin
# (the app reads from $XDG_DATA_HOME/boo/models, and Flatpak maps XDG_DATA_HOME
# to ~/.var/app/com.boo.app/data).
#
# Zig tarball sha256s below are the published ones from
# https://ziglang.org/download/index.json, re-check them when bumping Zig.

app-id: com.boo.app
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: boo-app

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Audio capture. Boo speaks PipeWire natively rather than through the
  # PulseAudio shim, and flatpak has no `--socket=pipewire`, the PipeWire
  # socket is exposed as a filesystem path instead.
  - --filesystem=xdg-run/pipewire-0
  # Persistent storage for the user's model file
  - --filesystem=xdg-data/boo:rw
  # XDG portals we depend on. Only these, Boo's toasts are in-app (AdwToast),
  # so it needs no Notification portal, and it talks to nothing else.
  - --talk-name=org.freedesktop.portal.GlobalShortcuts
  # Auto-paste keystroke synthesis (one-time user grant, persisted)
  - --talk-name=org.freedesktop.portal.RemoteDesktop

modules:
  # Zig 0.16 toolchain, not in the GNOME SDK, so we vendor it.
  - name: zig-x86_64
    buildsystem: simple
    only-arches: [x86_64]
    sources:
      - type: archive
        url: https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
        sha256: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
        strip-components: 1
    build-commands:
      - install -Dm755 zig "${FLATPAK_DEST}/bin/zig"
      - mkdir -p "${FLATPAK_DEST}/lib/zig"
      - cp -r lib/. "${FLATPAK_DEST}/lib/zig/"

  - name: zig-aarch64
    buildsystem: simple
    only-arches: [aarch64]
    sources:
      - type: archive
        url: https://ziglang.org/download/0.16.0/zig-aarch64-linux-0.16.0.tar.xz
        sha256: ea4b09bfb22ec6f6c6ceac57ab63efb6b46e17ab08d21f69f3a48b38e1534f17
        strip-components: 1
    build-commands:
      - install -Dm755 zig "${FLATPAK_DEST}/bin/zig"
      - mkdir -p "${FLATPAK_DEST}/lib/zig"
      - cp -r lib/. "${FLATPAK_DEST}/lib/zig/"

  - name: boo
    buildsystem: simple
    # `zig build` resolves the whisper.cpp dependency in build.zig.zon over the
    # network, and flatpak-builder's sandbox is offline by default. Granting the
    # build network access is fine for local and CI bundles.
    #
    # Flathub forbids this: a submission there must vendor whisper.cpp as a
    # declared `sources:` archive and build fully offline. That work is still to
    # do, and note Zig 0.16 changed its offline-package mechanism from the
    # `--system <p-dir>` layout older guides (and Ghostty) use, so it needs
    # working out against 0.16 rather than copying an older recipe.
    #
    # For whoever picks it up: the whisper.cpp v1.9.1 tarball
    #   https://github.com/ggml-org/whisper.cpp/archive/refs/tags/v1.9.1.tar.gz
    # is what build.zig.zon pins (hash N-V-__8AAAEmKwLLpQyHLBm_25WrTtfKVani5EWs5ZQTeY7_);
    # keep this in step with build.zig.zon when bumping whisper.cpp.
    build-options:
      build-args:
        - --share=network
    sources:
      - type: dir
        path: ../..
    build-commands:
      - zig build app -Doptimize=ReleaseFast --prefix "${FLATPAK_DEST}"
      - install -Dm644 linux/flatpak/com.boo.app.desktop
        "${FLATPAK_DEST}/share/applications/com.boo.app.desktop"
      - install -Dm644 linux/flatpak/com.boo.app.metainfo.xml
        "${FLATPAK_DEST}/share/metainfo/com.boo.app.metainfo.xml"
      - install -Dm644 assets/icon_256x256.png
        "${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/com.boo.app.png"
      - install -Dm644 assets/icon_512x512.png
        "${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/com.boo.app.png"
