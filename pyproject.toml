# Python here is test-support only — the mock XDG portal that linux/tests/
# drives Boo's portal clients against. Ruff (Astral) is the formatter and linter.
#   ruff format linux/tests
#   ruff check linux/tests
[tool.ruff]
line-length = 100
target-version = "py311"  # ubuntu-24.04 / python3-gi

[tool.ruff.lint]
extend-select = ["I", "UP", "B"]  # import sorting, pyupgrade, bugbear
