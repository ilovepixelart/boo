name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly, so newly published queries run against unchanged code too.
    - cron: '17 4 * * 1'

# CodeQL needs to publish results to the Security tab; nothing else is written.
permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      # c-cpp only: the frontends are C. Zig (the core) is not a CodeQL
      # language, and Swift would need a macOS build; both are out of scope
      # here. build-mode:none scans the C sources directly, so it needs none of
      # the gtk4/win32/pipewire headers the real build links against.
      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: none

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:c-cpp
