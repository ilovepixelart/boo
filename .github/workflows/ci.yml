name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Least privilege: CI only reads the repo. No job publishes anything, so the
# token never needs write. Without this block the workflow inherits the repo
# default token scope, which may be read/write.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Only supersede runs on a PR branch. On master, cancelling means a commit can
  # land with its slowest job (the Linux build) killed mid-flight and therefore
  # never actually verified, which is precisely how the Linux target stayed
  # broken while CI looked fine.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  macos:
    name: macOS (build + bundle)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Format check
        run: |
          zig fmt --check build.zig src/
          # swift-format ships with the toolchain since Swift 6; it is a
          # formatter, so --strict makes any drift from .swift-format fail here.
          swift format lint --strict --recursive macos/Sources

      - name: Unit tests (Zig core)
        # ReleaseSafe as well as Debug: the second run keeps the safety checks
        # while optimizing, so it catches UB that only appears optimized.
        run: |
          zig build test
          zig build test -Doptimize=ReleaseSafe

      - name: Build app
        # ReleaseFast is required: Debug C objects reference the UBSan runtime,
        # which swiftc's link step does not provide.
        run: zig build app -Doptimize=ReleaseFast

      - name: Swift unit tests + coverage
        # macos/Tests/main.swift, compiled with the sources under test by plain
        # swiftc (no Xcode project). Pins GhosttyInjector's subroutine event,
        # the injection security boundary, without needing Ghostty; llvm-cov's
        # lcov export becomes the Swift slice of the Sonar coverage report.
        run: bash scripts/coverage.sh swift

      - name: Upload coverage (Swift)
        uses: actions/upload-artifact@v5
        with:
          name: coverage-swift
          path: coverage/swift.xml

      - name: Cache bench models
        uses: actions/cache@v4
        with:
          path: ~/.boo/models
          # The SHA-256s are in the key: if a pinned hash ever changes, the old
          # (now wrong-hash) cache entry is bypassed rather than reused.
          key: bench-models-base-en-a03779c8-silero-v6.2.0-2aa269b7

      - name: Download bench models
        # fetch-model.sh fails the build on an HTTP error or a hash mismatch,
        # so a corrupt download can never be cached and reused across runs.
        run: |
          ./scripts/fetch-model.sh ~/.boo/models/ggml-base.en.bin \
            a03779c86df3323075f5e796cb2ce5029f00ec8869eee3fdfb897afe36c6d002 \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
          ./scripts/fetch-model.sh ~/.boo/models/ggml-silero-v6.2.0.bin \
            2aa269b785eeb53a82983a20501ddf7c1d9c48e33ab63a41391ac6c9f7fb6987 \
            https://huggingface.co/ggml-org/whisper-vad/resolve/main/ggml-silero-v6.2.0.bin

      - name: Quality gate (speed + accuracy)
        # Real inference over jfk.wav, gated on realtime factor and word error
        # rate. CPU-only for determinism on shared runners, and the thresholds
        # are deliberately loose: this catches collapses (accidentally
        # unoptimized ggml, transcript corruption, a broken chunker seam), not
        # micro-regressions. The streaming pass guards the VAD chunker: seam
        # bugs duplicate or drop words there and nowhere else.
        run: |
          zig build bench -Doptimize=ReleaseFast -- --cpu --assert-rtf 3 --assert-wer 5
          zig build bench -Doptimize=ReleaseFast -- --cpu --stream --assert-wer 5
          # 12-speaker LibriSpeech suite; 12% is 1.5x the measured base.en
          # baseline (7.9%), per tests/eval/README.md.
          zig build bench -Doptimize=ReleaseFast -- --cpu --suite tests/eval --assert-wer 12

      - name: Bundle Boo.app
        run: ./bundle.sh

      - name: Verify bundle
        run: |
          test -x zig-out/Boo.app/Contents/MacOS/Boo
          # --deep --strict: every nested binary must verify, not just the
          # bundle root; catches a bundle.sh signing regression before users
          # hit Gatekeeper with it.
          codesign --verify --deep --strict --verbose=2 zig-out/Boo.app
          # A bundle without themes silently falls back to one built-in theme.
          test "$(ls zig-out/Boo.app/Contents/Resources/themes | wc -l)" -gt 400
          # The Ghostty injector must actually be linked in.
          strings zig-out/Boo.app/Contents/MacOS/Boo | grep -q com.mitchellh.ghostty
          echo "bundle ok"

  lint:
    name: Lint (shell, C, Python)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install formatters
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            shellcheck shfmt clang-format
      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3

      - name: Shell (shellcheck + shfmt)
        # A broken build/test harness fails quietly, an unquoted expansion or a
        # trap that expands too early is the kind of bug that makes a suite lie.
        run: |
          shellcheck -S warning bundle.sh scripts/*.sh linux/tests/*.sh
          shfmt -d -i 4 -ci bundle.sh scripts/*.sh linux/tests/*.sh

      - name: C (clang-format)
        run: |
          clang-format --dry-run --Werror \
            linux/src/*.c linux/src/*.h \
            windows/src/*.c windows/src/*.h windows/tests/*.c \
            include/*.h

      - name: Windows inject plan (host test)
        # The paste-chord planner is pure C with no windows.h, so the test
        # that pins the exact Ctrl+V sequence runs right here on Linux.
        run: |
          cc -std=c11 -Wall -Wextra -Werror -I windows/src \
            windows/tests/inject_plan_test.c windows/src/inject_plan.c \
            -o /tmp/inject_plan_test
          /tmp/inject_plan_test

      - name: Version consistency
        # build.zig.zon is the source of truth; catch any file that drifted.
        run: ./scripts/check-version.sh

      - name: Python (ruff, Astral)
        run: |
          ruff check linux/tests scripts
          ruff format --check linux/tests scripts

      - name: YAML (workflows + dependabot + flatpak)
        # A malformed workflow or dependabot file fails silently, GitHub just
        # ignores it, so lint them here rather than discover it isn't running.
        run: |
          pipx install yamllint
          yamllint -d '{extends: relaxed, rules: {line-length: disable}}' \
            .github/ linux/flatpak/*.yaml

  linux:
    name: Linux (build + portal tests)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libsoup-3.0-dev libpipewire-0.3-dev \
            pkg-config xvfb dbus-x11 python3-gi imagemagick

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Unit tests (Zig core)
        # Runs on Linux too: the core selects its audio backend at comptime, so
        # the Linux build compiles a different backend than macOS does.
        run: zig build test

      - name: Build GTK4 app
        # First real check that the Linux frontend compiles AND links against
        # gtk4/libadwaita/pipewire, it cannot be linked on a macOS dev box.
        run: zig build app -Doptimize=ReleaseFast

      - name: Verify binary
        run: |
          test -x zig-out/bin/boo-app
          file zig-out/bin/boo-app
          echo "linux app ok"

      - name: Portal payload tests
        # GVariant format strings are parsed at runtime, so a malformed payload
        # would otherwise crash on a user's desktop rather than fail the build.
        run: ./linux/tests/run.sh

      - name: Portal integration tests
        # Runs both portal handshakes end to end against a live session bus.
        # This is what proves Boo's predicted Request path matches the one the
        # portal replies on, get that wrong and Boo waits forever.
        run: ./linux/tests/integration.sh

      - name: Install kcov
        # Built from a pinned release: Ubuntu noble does not package kcov.
        # Dep list per kcov's INSTALL.md; ~1 minute on the runner.
        run: |
          sudo apt-get install -y --no-install-recommends \
            binutils-dev libcurl4-openssl-dev libdw-dev libiberty-dev zlib1g-dev cmake
          git clone --depth 1 --branch v43 https://github.com/SimonKagstrom/kcov /tmp/kcov
          cmake -S /tmp/kcov -B /tmp/kcov/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/kcov/build -j"$(nproc)"
          sudo cmake --install /tmp/kcov/build

      - name: Cache smoke model
        uses: actions/cache@v4
        with:
          path: models
          key: smoke-model-c77c5766f1cef09b6b7d47f21b546cbddd4157886b3b5d6d4f709e91e66c7c2b

      - name: Fetch smoke model (tiny.en, pinned hash)
        # The instrumented app slice of the linux coverage drives the real UI
        # smoke, which needs a loadable speech model; tiny.en is the smallest.
        run: |
          bash scripts/fetch-model.sh models/ggml-tiny.en-q5_1.bin \
            c77c5766f1cef09b6b7d47f21b546cbddd4157886b3b5d6d4f709e91e66c7c2b \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en-q5_1.bin

      - name: Coverage (Linux C, Windows planner, Zig core)
        # Generic XMLs for the sonar job, plus kcov over the Zig core. The
        # core's number cannot land in Sonar (no Zig language there), so it
        # goes to the job summary and the coverage-core artifact instead.
        run: |
          bash scripts/coverage.sh windows linux core
          if [ -f coverage/core-summary.txt ]; then
            cat coverage/core-summary.txt >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage (Linux C + Windows planner)
        uses: actions/upload-artifact@v5
        with:
          name: coverage-linux
          path: coverage/*.xml

      - name: Upload coverage (Zig core, kcov)
        uses: actions/upload-artifact@v5
        with:
          name: coverage-core
          path: coverage/core

  linux-ui-smoke:
    name: Linux (UI smoke, pixel-asserted)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install runtime + smoke tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libsoup-3.0-dev libpipewire-0.3-dev \
            pkg-config xvfb dbus-x11 imagemagick xdotool

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Build GTK4 app
        run: zig build app -Doptimize=ReleaseFast

      - name: Fetch a small model
        # boo_init loads a whisper model; a tiny one is enough to reach the UI.
        run: |
          mkdir -p models
          curl -fSL --retry 3 -o models/ggml-tiny.en-q5_1.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en-q5_1.bin

      - name: UI smoke under Xvfb
        # No audio server: graceful audio degradation lets the window render
        # without one, and the render + record-morph + theme-switch checks need
        # no mic. ui-smoke.sh asserts the ACTUAL rendered colours (bg #282C34,
        # disc #FF3B30, and a persisted theme's #F7F7F7) so a theme or layout
        # regression fails here, not on a desktop.
        run: |
          export XDG_RUNTIME_DIR="$RUNNER_TEMP/xdg"
          mkdir -p "$XDG_RUNTIME_DIR"; chmod 700 "$XDG_RUNTIME_DIR"
          Xvfb :99 -screen 0 1280x800x24 >/dev/null 2>&1 &
          sleep 2
          export DISPLAY=:99
          eval "$(dbus-launch --sh-syntax)"
          BOO_SMOKE_OUT="$RUNNER_TEMP/smoke" bash linux/tests/ui-smoke.sh zig-out/bin/boo-app

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: linux-ui-smoke
          path: ${{ runner.temp }}/smoke/*.png
          if-no-files-found: ignore

  windows-cross:
    name: Windows (cross-compile, ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-windows-gnu, aarch64-windows-gnu]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0
          # Matrix jobs share a job name for caching purposes, so the target
          # must be part of the key or the two architectures evict each other.
          cache-key: ${{ matrix.target }}

      - name: Cross-compile app
        # Zig bundles mingw-w64 and its own resource compiler, so the full
        # Windows app, resources and manifest included, links from any host.
        # This is the cheap guard that keeps the Windows target from silently
        # rotting between runs of the native job.
        run: |
          zig build app -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast
          test -f zig-out/bin/boo-app.exe
          echo "windows cross ok"

  windows-native:
    name: Windows (build + tests)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Unit tests (Zig core)
        # First real execution of the Windows arms: the SRWLOCK mutex shim,
        # the WASAPI backend's pure maths, and the whole C ABI contract
        # (model-load failure, leak check, null-context sweep), none of which
        # need an audio device.
        run: |
          zig build test
          zig build test -Doptimize=ReleaseSafe

      - name: Build app
        run: zig build app -Doptimize=ReleaseFast

      - name: Verify binary
        shell: pwsh
        run: |
          if (-not (Test-Path zig-out/bin/boo-app.exe)) { exit 1 }
          Write-Output "windows app ok"

      - name: Launch smoke (proves native x86_64 runs, not just links)
        # The runner is native x86_64, so this answers whether the x86_64 build
        # actually executes on real hardware (the UTM ARM VM crash was pure x86
        # emulation). It also catches init/null crashes before a user ever runs it.
        shell: pwsh
        run: |
          $models = "$env:USERPROFILE\.boo\models"
          New-Item -ItemType Directory -Force $models | Out-Null
          curl.exe -fSL --retry 3 -o "$models\ggml-tiny.en-q5_1.bin" `
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en-q5_1.bin
          $p = Start-Process -FilePath zig-out/bin/boo-app.exe -PassThru
          Start-Sleep -Seconds 6
          if ($p.HasExited) {
            Write-Output "::error::boo-app.exe exited within 6s (exit $($p.ExitCode)) - native x86_64 launch/init crash"
            exit 1
          }
          Write-Output "boo-app.exe launched and stayed up on native x86_64"
          Stop-Process -Id $p.Id -Force

  flatpak-metadata:
    name: Linux (flatpak metadata)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Validate manifest and AppStream metadata
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            appstream flatpak-builder desktop-file-utils
          flatpak-builder --show-manifest linux/flatpak/com.boo.app.yaml > /dev/null
          # Strict: Flathub rejects submissions over these same warnings.
          appstreamcli validate --no-net linux/flatpak/com.boo.app.metainfo.xml
          desktop-file-validate linux/flatpak/com.boo.app.desktop
          echo "flatpak metadata ok"

  flatpak-build:
    name: Linux (flatpak build)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v7

      # Actually build the bundle. Metadata validation is not enough: it does
      # not check finish-args, so an invalid permission (e.g. a socket type
      # that does not exist) sails through --show-manifest and only blows up
      # in a real build, after which the app would have shipped with no
      # access to what it asked for.
      - uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6
        with:
          bundle: boo.flatpak
          manifest-path: linux/flatpak/com.boo.app.yaml
          # Keyed on the manifest, not the commit: a per-SHA key can never hit,
          # which made every push rebuild the GNOME runtime and dependencies
          # from scratch (~8 minutes, the whole pipeline's critical path).
          # flatpak-builder rebuilds changed modules incrementally on a hit.
          cache-key: flatpak-builder-${{ hashFiles('linux/flatpak/com.boo.app.yaml') }}

  sonar:
    name: SonarCloud
    runs-on: ubuntu-24.04
    # Waits for the per-platform coverage artifacts (scripts/coverage.sh run in
    # each job); the scan itself is what merges them.
    needs: [macos, linux]
    steps:
      - uses: actions/checkout@v7
        with:
          # Sonar needs full history to attribute new code and blame.
          fetch-depth: 0

      - name: Assemble coverage
        uses: actions/download-artifact@v6
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage

      - name: Fill in missing reports
        # A platform whose artifact is absent must not sink the scan; an empty
        # report is valid and simply contributes nothing.
        run: |
          mkdir -p coverage
          for f in windows linux swift; do
            [ -f "coverage/$f.xml" ] || printf '<coverage version="1"/>\n' > "coverage/$f.xml"
          done

      # Scans the C + Swift frontends per sonar-project.properties (the Zig core
      # is not a Sonar language). Read-only; PR decoration comes from the
      # SonarCloud GitHub App, not the token. Skipped on forks/without the
      # secret. Requires automatic analysis to be OFF in the SonarCloud project.
      - name: SonarQube Scan
        if: env.SONAR_TOKEN
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
