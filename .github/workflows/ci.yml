name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  # Only supersede runs on a PR branch. On master, cancelling means a commit can
  # land with its slowest job (the Linux build) killed mid-flight and therefore
  # never actually verified — which is precisely how the Linux target stayed
  # broken while CI looked fine.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  macos:
    name: macOS (build + bundle)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: |
          zig fmt --check build.zig src/
          # swift-format ships with the toolchain since Swift 6; it is a
          # formatter, so --strict makes any drift from .swift-format fail here.
          swift format lint --strict --recursive macos/Sources

      - name: Unit tests (Zig core)
        # ReleaseSafe as well as Debug: the second run keeps the safety checks
        # while optimizing, so it catches UB that only appears optimized.
        run: |
          zig build test
          zig build test -Doptimize=ReleaseSafe

      - name: Build app
        # ReleaseFast is required: Debug C objects reference the UBSan runtime,
        # which swiftc's link step does not provide.
        run: zig build app -Doptimize=ReleaseFast

      - name: Bundle Boo.app
        run: ./bundle.sh

      - name: Verify bundle
        run: |
          test -x zig-out/Boo.app/Contents/MacOS/Boo
          codesign -v zig-out/Boo.app
          # A bundle without themes silently falls back to one built-in theme.
          test "$(ls zig-out/Boo.app/Contents/Resources/themes | wc -l)" -gt 400
          # The Ghostty injector must actually be linked in.
          strings zig-out/Boo.app/Contents/MacOS/Boo | grep -q com.mitchellh.ghostty
          echo "bundle ok"

  lint:
    name: Lint (shell, C, Python)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install formatters
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            shellcheck shfmt clang-format
      - uses: astral-sh/ruff-action@v3

      - name: Shell (shellcheck + shfmt)
        # A broken build/test harness fails quietly — an unquoted expansion or a
        # trap that expands too early is the kind of bug that makes a suite lie.
        run: |
          shellcheck -S warning bundle.sh scripts/*.sh linux/tests/*.sh
          shfmt -d -i 4 -ci bundle.sh scripts/*.sh linux/tests/*.sh

      - name: C (clang-format)
        run: clang-format --dry-run --Werror linux/src/*.c linux/src/*.h include/*.h

      - name: Python (ruff — Astral)
        run: |
          ruff check linux/tests
          ruff format --check linux/tests

      - name: YAML (workflows + dependabot + flatpak)
        # A malformed workflow or dependabot file fails silently — GitHub just
        # ignores it — so lint them here rather than discover it isn't running.
        run: |
          pipx install yamllint
          yamllint -d '{extends: relaxed, rules: {line-length: disable}}' \
            .github/ linux/flatpak/*.yaml

  linux:
    name: Linux (build + portal tests)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev libpipewire-0.3-dev pkg-config \
            xvfb dbus-x11 python3-gi

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Unit tests (Zig core)
        # Runs on Linux too: the core selects its audio backend at comptime, so
        # the Linux build compiles a different backend than macOS does.
        run: zig build test

      - name: Build GTK4 app
        # First real check that the Linux frontend compiles AND links against
        # gtk4/libadwaita/pipewire — it cannot be linked on a macOS dev box.
        run: zig build app -Doptimize=ReleaseFast

      - name: Verify binary
        run: |
          test -x zig-out/bin/boo-app
          file zig-out/bin/boo-app
          echo "linux app ok"

      - name: Portal payload tests
        # GVariant format strings are parsed at runtime, so a malformed payload
        # would otherwise crash on a user's desktop rather than fail the build.
        run: ./linux/tests/run.sh

      - name: Portal integration tests
        # Runs both portal handshakes end to end against a live session bus.
        # This is what proves Boo's predicted Request path matches the one the
        # portal replies on — get that wrong and Boo waits forever.
        run: ./linux/tests/integration.sh

  flatpak-metadata:
    name: Linux (flatpak metadata)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Validate manifest and AppStream metadata
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            appstream flatpak-builder desktop-file-utils
          flatpak-builder --show-manifest linux/flatpak/com.boo.app.yaml > /dev/null
          # Strict: Flathub rejects submissions over these same warnings.
          appstreamcli validate --no-net linux/flatpak/com.boo.app.metainfo.xml
          desktop-file-validate linux/flatpak/com.boo.app.desktop
          echo "flatpak metadata ok"

  flatpak-build:
    name: Linux (flatpak build)
    runs-on: ubuntu-24.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v7

      # Actually build the bundle. Metadata validation is not enough: it does
      # not check finish-args, so an invalid permission (e.g. a socket type
      # that does not exist) sails through --show-manifest and only blows up
      # in a real build — after which the app would have shipped with no
      # access to what it asked for.
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: boo.flatpak
          manifest-path: linux/flatpak/com.boo.app.yaml
          cache-key: flatpak-builder-${{ github.sha }}
