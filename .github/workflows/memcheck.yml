name: Memcheck

# The full inference stack under valgrind. Too slow for a per-push gate even
# in quick mode (memcheck on a single core runs the SSE-baseline build for
# the better part of an hour), so it runs nightly and on demand instead;
# memory bugs still surface within a day. See the job comments for why every
# flag is the way it is.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-memcheck:
    name: Linux (valgrind memcheck)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        # gtk/adwaita too: the default build step also compiles the GTK app.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            valgrind libgtk-4-dev libadwaita-1-dev libsoup-3.0-dev \
            libpipewire-0.3-dev pkg-config

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Cache bench models
        uses: actions/cache@v6
        with:
          path: ~/.boo/models
          # SHA-256s in the key: a changed hash bypasses the stale entry.
          key: bench-models-base-en-a03779c8-silero-v6.2.0-2aa269b7

      - name: Download bench models
        # Fails on HTTP error or hash mismatch, so a corrupt model can't be
        # cached and then feed the GGUF parser this job exists to memcheck.
        run: |
          ./scripts/fetch-model.sh ~/.boo/models/ggml-base.en.bin \
            a03779c86df3323075f5e796cb2ce5029f00ec8869eee3fdfb897afe36c6d002 \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
          ./scripts/fetch-model.sh ~/.boo/models/ggml-silero-v6.2.0.bin \
            2aa269b785eeb53a82983a20501ddf7c1d9c48e33ab63a41391ac6c9f7fb6987 \
            https://huggingface.co/ggml-org/whisper-vad/resolve/main/ggml-silero-v6.2.0.bin

      - name: Build bench
        # x86_64_v2: the runner's native ISA includes AVX-512-class
        # instructions that ubuntu-24.04's valgrind cannot decode (SIGILL in
        # Zig's ReleaseFast memcpy before main). Performance under memcheck
        # is irrelevant, correctness of decoding is not.
        run: zig build -Doptimize=ReleaseFast -Dcpu=x86_64_v2

      - name: Memcheck full inference
        # The entire stack (model load, mel, encoder, decoder, VAD, chunker
        # commits, teardown) runs under valgrind, which catches the class of
        # bug (GGUF-style overflow, use-after-free, definite leaks) that unit
        # tests and WER gates never see. Valgrind was chosen over ASan because
        # Zig's build system has no first-class ASan support for mixed
        # Zig/C builds; memcheck needs no build changes and LeakSanitizer is
        # broken on Apple Silicon anyway, so Linux is where this job belongs.
        # Memcheck is ~25x slower than native, hence --runs 1 and the
        # single-utterance streaming take.
        # --show-mismatched-frees=no: Zig bundles its own libc++ in which
        # operator delete lowers to plain free(), so valgrind would flag every
        # C++ deallocation in whisper.cpp (~100k false errors). The pairing is
        # malloc-compatible by construction; OOB, use-after-free, and leak
        # checking are unaffected.
        #
        # BOO_THREADS=1 is essential, not a tweak: memcheck serializes all
        # threads onto one core, where ggml's spin-waiting workers starve the
        # one doing the work and the job runs for hours. --quick + a short
        # eval clip keep it to one inference per code path.
        env:
          BOO_THREADS: 1
        run: |
          valgrind --leak-check=full --errors-for-leak-kinds=definite \
            --show-mismatched-frees=no --error-exitcode=1 \
            ./zig-out/bin/boo-bench --cpu --quick \
            ~/.boo/models/ggml-base.en.bin tests/eval/2094-142345-0007.wav
          valgrind --leak-check=full --errors-for-leak-kinds=definite \
            --show-mismatched-frees=no --error-exitcode=1 \
            ./zig-out/bin/boo-bench --cpu --quick --stream --utterances 1 \
            ~/.boo/models/ggml-base.en.bin tests/eval/2094-142345-0007.wav

