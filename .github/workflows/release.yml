name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

# Least privilege at the top: the build jobs only upload artifacts and need no
# write. Only the publish job below re-grants contents: write to create the
# GitHub Release.
permissions:
  contents: read

jobs:
  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners per architecture, cross-compiling Swift + Zig +
          # whisper and lipo-ing them is far more fragile than just building
          # each on its own machine.
          #
          # Use macos-15, not macos-13/14: macos-13 has been retired (a job
          # targeting it queues forever without ever starting, which is not an
          # obvious failure mode) and macos-14 is deprecated. Intel is now
          # `macos-15-intel`.
          - runner: macos-15        # Apple Silicon
            arch: arm64
          - runner: macos-15-intel  # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Build, bundle, package
        run: |
          zig build app -Doptimize=ReleaseFast
          ./bundle.sh
          ./scripts/make-dmg.sh

      - name: Confirm architecture
        run: |
          BIN=zig-out/Boo.app/Contents/MacOS/Boo
          file "$BIN"
          file "$BIN" | grep -q "${{ matrix.arch }}" || {
            echo "::error::binary is not ${{ matrix.arch }}"; exit 1; }

      - uses: actions/upload-artifact@v5
        with:
          name: dmg-${{ matrix.arch }}
          path: zig-out/*.dmg

  linux-flatpak:
    name: Linux Flatpak (x86_64, preview)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6
        with:
          bundle: boo.flatpak
          manifest-path: linux/flatpak/com.boo.app.yaml
          # Manifest-keyed for the same reason as CI: a per-SHA key never hits.
          cache-key: flatpak-builder-${{ hashFiles('linux/flatpak/com.boo.app.yaml') }}
          # The action uploads the bundle as an artifact itself. Left on, that
          # artifact and the version-named one below both land in the release,
          # attaching the same 60MB file twice under two names.
          upload-artifact: false

      - name: Name the bundle by version
        # Interpolate the ref through env, not directly into the shell: a ref
        # name is attacker-influenceable and could carry shell metacharacters.
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: mv boo.flatpak "boo-$TAG-x86_64.flatpak"

      - uses: actions/upload-artifact@v5
        with:
          name: flatpak
          path: '*.flatpak'

  windows-zip:
    name: Windows zip (${{ matrix.arch }}, experimental)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both cross-compiled by Zig on the same x86_64 runner: x86_64 is
          # native, aarch64 is a cross build (as ci.yml already proves). ARM64
          # is what Windows-on-ARM (Copilot+ PCs, Surface, and Apple Silicon
          # VMs) needs, the x86_64 zip only runs there under emulation.
          - arch: x86_64
            target: x86_64-windows-gnu
            machine: '0x8664'
          - arch: arm64
            target: aarch64-windows-gnu
            machine: '0xAA64'
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build app -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Confirm architecture
        # Guard against a silent wrong-arch build, the mistake that shipped an
        # Intel-only 0.4.x: read the PE header's machine field and match it.
        shell: pwsh
        run: |
          $bytes = [System.IO.File]::ReadAllBytes("zig-out/bin/boo-app.exe")
          $peOff = [BitConverter]::ToInt32($bytes, 0x3C)
          $hex = '0x{0:X4}' -f [BitConverter]::ToUInt16($bytes, $peOff + 4)
          Write-Host "PE machine: $hex"
          if ($hex -ne '${{ matrix.machine }}') {
            Write-Host "::error::binary is not ${{ matrix.arch }} (got $hex)"
            exit 1
          }

      - name: Package
        shell: pwsh
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          New-Item -ItemType Directory pkg | Out-Null
          Copy-Item zig-out/bin/boo-app.exe pkg/
          Copy-Item LICENSE pkg/
          Compress-Archive -Path pkg/* -DestinationPath "boo-$env:TAG-windows-${{ matrix.arch }}.zip"

      - uses: actions/upload-artifact@v5
        with:
          name: windows-zip-${{ matrix.arch }}
          path: '*.zip'

  release:
    name: Publish release
    needs: [macos-dmg, linux-flatpak, windows-zip]
    # Publish whatever built. The Linux bundle is a preview and the Windows
    # zip experimental; a failure there should not block the macOS release.
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    # The only job that writes: creating the GitHub Release needs contents:write.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        # The macOS builds aren't notarized, so there's no Apple signature to
        # vouch for them. Publishing SHA-256 sums lets anyone verify a download
        # is intact and untampered, the integrity guarantee an open-source
        # project offers in place of notarization.
        working-directory: dist
        run: |
          shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        # --notes-file rather than an inline string: notes indented inside a YAML
        # block would carry their leading whitespace and render as a code block.
        # --generate-notes appends the auto-generated changelog underneath.
        run: |
          gh release create "$TAG" dist/* \
            --title "Boo $TAG" \
            --notes-file .github/release-notes.md \
            --generate-notes \
            || gh release upload "$TAG" dist/* --clobber
