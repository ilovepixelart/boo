name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners per architecture — cross-compiling Swift + Zig +
          # whisper and lipo-ing them is far more fragile than just building
          # each on its own machine.
          #
          # Use macos-15, not macos-13/14: macos-13 has been retired (a job
          # targeting it queues forever without ever starting, which is not an
          # obvious failure mode) and macos-14 is deprecated. Intel is now
          # `macos-15-intel`.
          - runner: macos-15        # Apple Silicon
            arch: arm64
          - runner: macos-15-intel  # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build, bundle, package
        run: |
          zig build app -Doptimize=ReleaseFast
          ./bundle.sh
          ./scripts/make-dmg.sh

      - name: Confirm architecture
        run: |
          BIN=zig-out/Boo.app/Contents/MacOS/Boo
          file "$BIN"
          file "$BIN" | grep -q "${{ matrix.arch }}" || {
            echo "::error::binary is not ${{ matrix.arch }}"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: zig-out/*.dmg

  linux-flatpak:
    name: Linux Flatpak (x86_64, preview)
    runs-on: ubuntu-24.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: boo.flatpak
          manifest-path: linux/flatpak/com.boo.app.yaml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Name the bundle by version
        run: mv boo.flatpak "boo-${{ github.event.inputs.tag || github.ref_name }}-x86_64.flatpak"

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: '*.flatpak'

  release:
    name: Publish release
    needs: [macos-dmg, linux-flatpak]
    # Publish whatever built. The Linux bundle is a preview; a failure there
    # should not block the macOS release.
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show what we're publishing
        run: ls -la dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        # --notes-file rather than an inline string: notes indented inside a YAML
        # block would carry their leading whitespace and render as a code block.
        # --generate-notes appends the auto-generated changelog underneath.
        run: |
          gh release create "$TAG" dist/* \
            --title "Boo $TAG" \
            --notes-file .github/release-notes.md \
            --generate-notes \
            || gh release upload "$TAG" dist/* --clobber
