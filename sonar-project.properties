sonar.projectKey=ilovepixelart_boo
sonar.organization=ilovepixelart
sonar.projectName=boo

# Product code: the C frontends, the Swift frontend, and the public C API header.
# The Zig core (src/*.zig) is not a SonarCloud language, so it is not analysed
# here; its safety is covered by `zig build test` and the fuzz/bench suites.
sonar.sources=include,linux/src,windows/src,macos/Sources

# Test harnesses are analysed too (as test code), so their findings still show
# and the worthwhile ones get fixed.
sonar.tests=linux/tests,windows/tests,macos/Tests

# Excluded: build/release helpers (dev tooling, not shipped) and a vendored
# libc++ ABI shim that is not ours to restyle.
sonar.exclusions=scripts/**,**/libcxx_compat.cpp

sonar.c.file.suffixes=.c,.h
sonar.sourceEncoding=UTF-8

# Language hints (Boo is multi-language: C frontends, Swift on macOS, Python in
# the Linux test harness). Pinning the Python version sharpens that analysis.
sonar.python.version=3.11,3.12,3.13

# Coverage: generated per platform in CI (scripts/coverage.sh, one generic XML
# each) and merged here. Product files count toward the metric; the irreducible
# OS-shell TUs (listed in sonar.coverage.exclusions below), whose testable logic
# is already extracted into host-tested sibling modules, are excluded so the
# number reflects code that unit tests can actually reach. The Zig core cannot
# be imported, Sonar has no Zig language; it is measured with kcov in CI instead
# (job summary + the coverage-core artifact).
sonar.coverageReportPaths=coverage/windows.xml,coverage/windows-native.xml,coverage/linux.xml,coverage/swift.xml

# Headers hold declarations; nothing executable to measure. The rest are the
# irreducible OS-shell TUs whose every testable line has first been extracted
# into a host-tested sibling module, leaving only code a running app exercises:
#   overlay.c   -> card layout/geometry in overlay_layout, colours in palette,
#                  history in history.c, truncation in utf8; residual is GDI
#                  painting + the window proc + worker threads.
#   tray.c      -> the recording-timer text in tray_fmt; residual is
#                  Shell_NotifyIcon + the tray menu.
#   inject.c    -> the paste-chord/eligibility in inject_plan; residual is the
#                  clipboard API + SendInput.
#   hotkey.c    -> RegisterHotKey only, no logic to extract.
#   Permissions.swift -> the once-per-launch latch is unit-tested; residual is
#                  the mic-TCC/Accessibility APIs and their modal prompts.
# TextDelivery.swift is deliberately NOT excluded: its pure helpers
# (resolveKeyCode, snapshotPasteboard, shouldRestoreClipboard) are unit-tested
# and must keep counting; only its CGEvent/async residual is uncovered.
sonar.coverage.exclusions=include/**,macos/Sources/Permissions.swift,windows/src/tray.c,windows/src/hotkey.c,windows/src/inject.c,windows/src/overlay.c

# False positives silenced in-repo so they cannot reappear on every scan:
# - glibcb: "make this parameter pointer-to-const" (c:S995) on GLib/GTK
#   callback implementations. Their signatures are dictated by the library
#   typedefs (GtkDrawingAreaDrawFunc, GTaskThreadFunc, GDBusSignalCallback,
#   GtkTickCallback); constifying a parameter changes the function-pointer
#   type, and the cast needed to register it is undefined behavior.
sonar.issue.ignore.multicriteria=glibcb
sonar.issue.ignore.multicriteria.glibcb.ruleKey=c:S995
sonar.issue.ignore.multicriteria.glibcb.resourceKey=linux/src/**
