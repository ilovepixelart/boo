sonar.projectKey=ilovepixelart_boo
sonar.organization=ilovepixelart
sonar.projectName=boo

# Product code: the C frontends, the Swift frontend, and the public C API header.
# The Zig core (src/*.zig) is not a SonarCloud language, so it is not analysed
# here; its safety is covered by `zig build test` and the fuzz/bench suites.
sonar.sources=include,linux/src,windows/src,macos/Sources

# Test harnesses are analysed too (as test code), so their findings still show
# and the worthwhile ones get fixed.
sonar.tests=linux/tests,windows/tests

# Excluded: build/release helpers (dev tooling, not shipped) and a vendored
# libc++ ABI shim that is not ours to restyle.
sonar.exclusions=scripts/**,**/libcxx_compat.cpp

sonar.c.file.suffixes=.c,.h
sonar.sourceEncoding=UTF-8

# Language hints (Boo is multi-language: C frontends, Swift on macOS, Python in
# the Linux test harness). Pinning the Python version sharpens that analysis.
sonar.python.version=3.11,3.12,3.13

# Coverage: generated in CI and imported here. Boo's most-tested code is the Zig
# core, which SonarCloud does not analyse, so reported coverage reflects the
# C/Swift frontends only (see scripts/coverage.sh).
sonar.coverageReportPaths=coverage/sonar-coverage.xml

# Exclude from coverage the code that only a running app exercises (the overlay
# windows, waveform, tray, portals, AppKit UI): it is verified by the pixel
# smoke test and UAT, not unit tests. What stays measured is the unit-testable
# logic, e.g. the Windows paste-chord planner. (The Zig core is where the real
# unit tests live, but Sonar does not see Zig.)
sonar.coverage.exclusions=**/*.swift,linux/src/**,windows/src/main.c,windows/src/overlay.c,windows/src/settings.c,windows/src/waveform.c,windows/src/tray.c,windows/src/model.c,windows/src/inject.c,windows/src/hotkey.c,include/**
